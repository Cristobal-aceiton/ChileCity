<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Banco — ChileCity RP</title>
</head>
<body>

  <h1 class="hi-temp">Hola, <span class="ten-green">Tenpista</span></h1>
  
<div class="card-1">
    <div class="saldo-container">
        <h1 id="saldo-1">$0</h1>

        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="white">
            <path d="M12 5C7 5 2.7 8.1 1 12c1.7 3.9 6 7 11 7s9.3-3.1 11-7c-1.7-3.9-6-7-11-7zm0 12c-2.8 0-5-2.2-5-5s2.2-5 5-5 5 2.2 5 5-2.2 5-5 5zm0-8a3 3 0 100 6 3 3 0 000-6z"/>
        </svg>

    </div>

    <div class="fila-1">
      <h2>Nº de cuenta</h2>
      <p id="n-cuenta">x</p>
    </div>

</div>

<div class="card-2" onclick="mostrarSeccion('tarjeta')">
  <h1>Tarjeta fisica</h1>
  <p id="N-tarjeta-mini">**** **** ****</p>
  <img src="tarjeta1.png" alt="">
</div>

<h1 class="que-sige">¿Y que hacemos ahora?</h1>

<div class="boxes">

  <div class="box1" onclick="abrirTransferencia()">
    <img src="billete.svg" alt="">
    <p>Transferir</p>
  </div>

  <div class="box1">
    <img src="historial.svg" alt="">
    <p>Historial</p>
  </div>

  <div class="box1">
    <img src="contactos.svg" alt="">
    <p>Contactos</p>
  </div>

  <div class="box1">
    <img src="prestamos.svg" alt="">
    <p>Prestamos</p>
  </div>

</div>

<section id="tarjeta" class="seccion">

    <h1>Tarjeta debito</h1>

    <img src="tarjeta2.webp">

    <p id="N-tarjeta-full">Número de cuenta: **** **** ****</p>

    <button onclick="volver()">Volver</button>

</section>

<section id="transferir" class="seccion">

    <h1>Transferir</h1>

    <form id="transfer-form" class="transfer-form">

      <label for="transfer-rut">RUT del destinatario</label>
      <input type="text" id="transfer-rut" placeholder="Ej: 12345678-9" autocomplete="off">

      <label for="transfer-monto">Monto</label>
      <input type="number" id="transfer-monto" placeholder="Ej: 10000" min="1" step="1">

      <p id="transfer-msg" class="transfer-msg"></p>

      <button type="submit" id="transfer-btn">Transferir</button>

    </form>

    <button onclick="volver()">Volver</button>

</section>

</body>
</html>

<style>

body,html {
  background-color: rgb(19, 19, 19);
  margin: 0px;
}
.card-1 {
  background-color: rgb(37, 37, 37);
  width: 100%;
  max-width: 350px;
  margin: 0 auto;
  margin-top: 30px;
  padding: 20px;
  box-sizing: border-box;
  border-radius: 20px;
}

.card-1 h1 {
  font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
  color: white;
  font-weight: 300;
}

.hi-temp {
  color: #ffffff;
  font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
  font-weight: 600;
  font-size: 25px;
  max-width: 350px;
  margin: 0 auto;
  margin-top: 20px;
}

.card-1 svg {
  cursor: pointer;
  margin-left: 300px;
}

.saldo-container {
    display: flex;
    align-items: center;
}

.saldo-container h1 {
    margin: 0;
}

.saldo-container svg {
    margin-left: 10px;
    cursor: pointer;
    flex-shrink: 0;
}

.card-1 h2 {
  color: white;
  font-family: Arial, Helvetica, sans-serif;
  font-size: 15px;
  font-weight: 100;
}

.card-1 p {
  color:  rgb(0, 236, 138);
  font-family: Arial, Helvetica, sans-serif;
}

.fila-1 {
    display: flex;
    gap: 20px;
    align-items: center;
    margin-top: 20px;
}

.card-2 {
  position: relative;
  background-color: rgb(0, 236, 138);
  max-width: 350px;
  margin: 30px auto;
  border-radius: 10px;
  padding: 5px;
  overflow: visible;
  cursor: pointer;
}

.card-2 h1 {
  font-size: 20px;
  margin-left: 20px;  
  font-family: Arial, Helvetica, sans-serif;
  font-weight: 600;
  margin-bottom: 0;
}

.card-2 p {
  font-family: Arial, Helvetica, sans-serif;
  font-size: 38px;
  margin-left: 20px;
  margin-top: 0px;
  margin-bottom: 0px;
}

.card-2 img {
  width: 50px;
  position: absolute;
  right: 30px; 
  top: 30%;
  transform: translateY(-50%);
}

.que-sige {
  max-width: 350px;
  margin: 0 auto;
  color: white;
  font-family: Arial, Helvetica, sans-serif;
  font-size: 20px;
  font-weight: 400;
}

.boxes {
  max-width: 350px;
  margin: 20px auto;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 15px;
}

.box1 {
  background-color: rgb(37, 37, 37);
  height: 90px;
  border-radius: 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  cursor: pointer;
}

.box1 img {
  width: 35px;
  height: 35px;
}

.box1 p {
  color: white;
  font-family: Arial, Helvetica, sans-serif;
  font-size: 12px;
  margin: 8px 0 0;
}

.ten-green {
  color: #00ec8a;
}

.seccion {
  display: none;
  max-width: 350px;
  margin: 0 auto;
}

.seccion img {
  position: relative;
  width: 220px;
  margin-left: 94px; 
}

.seccion h1 {
  text-align: center;
  font-family: Arial, Helvetica, sans-serif;
  color: white;
  font-weight: bold;
  font-size: 25px;
}

.seccion p {
  color: #ffffff;
  font-family: Arial, Helvetica, sans-serif;
  text-align: center;
  font-weight: 400;
}

.seccion button {
  background-color: #00ec8a;
  font-family: Arial, Helvetica, sans-serif;
  font-weight: bold;
  color: #ffffff;
  padding-left: 20px;
  padding-right: 20px;
  padding-bottom: 8px;
  padding-top: 8px;
  border-radius: 15px;
  margin-left: 155px;
  text-decoration: none;
  border: none;
  cursor: pointer;
}

.transfer-form {
  display: flex;
  flex-direction: column;
  gap: 6px;
  padding: 0 20px;
  box-sizing: border-box;
}

.transfer-form label {
  color: #ffffff;
  font-family: Arial, Helvetica, sans-serif;
  font-size: 13px;
  margin-top: 10px;
}

.transfer-form input {
  background-color: rgb(37, 37, 37);
  border: 1px solid rgb(60, 60, 60);
  color: #ffffff;
  font-family: Arial, Helvetica, sans-serif;
  font-size: 15px;
  padding: 10px 12px;
  border-radius: 10px;
  box-sizing: border-box;
}

.transfer-form input:focus {
  outline: none;
  border-color: #00ec8a;
}

.transfer-form button[type="submit"] {
  margin: 10px 0 20px;
  align-self: center;
}

.transfer-msg {
  min-height: 18px;
  font-size: 13px;
  text-align: center;
  margin: 4px 0 0;
}

.transfer-msg.error {
  color: #ff5c5c;
}

.transfer-msg.exito {
  color: #00ec8a;
}

</style>

<script>

function mostrarSeccion(id) {

    document.querySelector(".card-1").style.display = "none";
    document.querySelector(".card-2").style.display = "none";
    document.querySelector(".que-sige").style.display = "none";
    document.querySelector(".boxes").style.display = "none";


    document.getElementById(id).style.display = "block";
}


function volver(){

    document.querySelector(".card-1").style.display = "block";
    document.querySelector(".card-2").style.display = "block";
    document.querySelector(".que-sige").style.display = "block";
    document.querySelector(".boxes").style.display = "grid";

    // Oculta cualquier sección que haya quedado abierta (tarjeta, transferir, etc.)
    document.querySelectorAll(".seccion").forEach(function (sec) {
      sec.style.display = "none";
    });

}

</script>

<script src="/js/banco-cuenta.js?v=62"></script>
