<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Banco — ChileCity RP</title>
</head>
<body>

  <h1 class="hi-temp">Hola, <span class="ten-green">Tenpista</span></h1>
  
<div class="card-1">
    <div class="saldo-container">
        <h1 id="saldo-1">$0</h1>

        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="white">
            <path d="M12 5C7 5 2.7 8.1 1 12c1.7 3.9 6 7 11 7s9.3-3.1 11-7c-1.7-3.9-6-7-11-7zm0 12c-2.8 0-5-2.2-5-5s2.2-5 5-5 5 2.2 5 5-2.2 5-5 5zm0-8a3 3 0 100 6 3 3 0 000-6z"/>
        </svg>

    </div>

    <div class="fila-1">
      <h2>Nº de cuenta</h2>
      <p id="n-cuenta">x</p>
    </div>

    <button id="btn-abrir-cuenta" class="abrir-cuenta-btn" style="display:none;">Abrir tu cuenta bancaria</button>
    <p id="abrir-cuenta-msg" class="transfer-msg" style="display:none;"></p>

</div>

<div class="card-2" onclick="mostrarSeccion('tarjeta')">
  <h1>Tarjeta fisica</h1>
  <p id="N-tarjeta-mini">**** **** ****</p>
</div>

<h1 class="que-sige">¿Y que hacemos ahora?</h1>

<div class="boxes">

  <div class="box1" onclick="abrirTransferencia()">
    <img src="billete.svg" alt="">
    <p>Transferir</p>
  </div>

  <div class="box1" onclick="abrirHistorial()">
    <img src="historial.svg" alt="">
    <p>Historial</p>
  </div>

  <div class="box1" onclick="abrirContactos()">
    <img src="contactos.svg" alt="">
    <p>Contactos</p>
  </div>

  <div class="box1">
    <img src="prestamos.svg" alt="">
    <p>Prestamos</p>
  </div>

</div>

<section id="tarjeta" class="seccion">

    <h1>Tarjeta debito</h1>

    <img src="tarjeta2.webp">

    <p id="N-tarjeta-full">Número de cuenta: **** **** ****</p>

    <button onclick="volver()">Volver</button>

</section>

<section id="transferir" class="seccion">

    <h1>Transferir</h1>

    <form id="transfer-form" class="transfer-form">

      <label for="transfer-rut">RUT del destinatario</label>
      <input type="text" id="transfer-rut" placeholder="Ej: 12345678-9" autocomplete="off">

      <label for="transfer-monto">Monto</label>
      <input type="number" id="transfer-monto" placeholder="Ej: 10000" min="1" step="1">

      <p id="transfer-msg" class="transfer-msg"></p>

      <button type="submit" id="transfer-btn">Transferir</button>

    </form>

    <button onclick="volver()">Volver</button>

</section>

<section id="historial" class="seccion">

    <h1>Historial</h1>

    <div id="historial-lista" class="historial-lista">
      <p class="hist-vacio">Cargando movimientos...</p>
    </div>

    <button onclick="volver()">Volver</button>

</section>

<section id="contactos" class="seccion">

    <h1>Contactos</h1>

    <div id="contactos-lista" class="contactos-lista">
      <p class="hist-vacio">Cargando contactos...</p>
    </div>

    <form id="contacto-form" class="transfer-form">

      <label for="contacto-nombre">Nombre del contacto</label>
      <input type="text" id="contacto-nombre" placeholder="Ej: Juan Pérez" autocomplete="off">

      <label for="contacto-rut">RUT del contacto</label>
      <input type="text" id="contacto-rut" placeholder="Ej: 12345678-9" autocomplete="off">

      <p id="contacto-msg" class="transfer-msg"></p>

      <button type="submit" id="contacto-btn">Agregar contacto</button>

    </form>

    <button onclick="volver()">Volver</button>

</section>

</body>
</html>

<style>

  gap: 2px;

  color: #ffffff !important;

<script>

function mostrarSeccion(id) {

    document.querySelector(".card-1").style.display = "none";
    document.querySelector(".card-2").style.display = "none";
    document.querySelector(".que-sige").style.display = "none";
    document.querySelector(".boxes").style.display = "none";


    document.getElementById(id).style.display = "block";
}


function volver(){

    document.querySelector(".card-1").style.display = "block";
    document.querySelector(".card-2").style.display = "block";
    document.querySelector(".que-sige").style.display = "block";
    document.querySelector(".boxes").style.display = "grid";

    // Oculta cualquier sección que haya quedado abierta (tarjeta, transferir, etc.)
    document.querySelectorAll(".seccion").forEach(function (sec) {
      sec.style.display = "none";
    });

}

// ══════════════════════════════════════════════════════════════════════════
// Conexión de banco.html con la API real (/api/banco).
// La identidad del usuario viene de la cookie de sesión (cc_session), por
// eso no hace falta mandar discord_id a mano: el navegador la envía sola en
// cada fetch same-origin.
// ══════════════════════════════════════════════════════════════════════════
(function () {
  const $ = (id) => document.getElementById(id);

  let cuentaActual = null;

  function formatCLP(monto) {
    const n = Number(monto) || 0;
    return '$' + n.toLocaleString('es-CL');
  }

  // Enmascara el número de cuenta dejando solo los últimos 4 dígitos visibles.
  function maskNumeroCuenta(numero) {
    const limpio = String(numero || '').replace(/[^0-9]/g, '');
    if (limpio.length <= 4) return numero || '';
    const ultimos4 = limpio.slice(-4);
    const grupos = Math.max(0, Math.ceil(limpio.length / 4) - 1);
    return `${'•••• '.repeat(grupos).trim()} ${ultimos4}`.trim();
  }

  // ── Carga saldo + número de cuenta ───────────────────────────────────────
  async function cargarCuenta() {
    const saldoEl   = $('saldo-1');
    const cuentaEl  = $('n-cuenta');
    const miniEl    = $('N-tarjeta-mini');
    const fullEl    = $('N-tarjeta-full');
    const btnAbrir  = $('btn-abrir-cuenta');
    const msgAbrir  = $('abrir-cuenta-msg');
    const card2El   = document.querySelector('.card-2');
    const boxesEl   = document.querySelector('.boxes');

    try {
      const res = await fetch('/api/banco?action=cuenta');

      if (res.status === 401) {
        if (saldoEl) saldoEl.textContent = 'Inicia sesión';
        if (cuentaEl) cuentaEl.textContent = '—';
        if (miniEl) miniEl.textContent = 'Inicia sesión';
        if (btnAbrir) btnAbrir.style.display = 'none';
        return;
      }

      if (res.status === 404) {
        if (saldoEl) saldoEl.textContent = '$0';
        if (cuentaEl) cuentaEl.textContent = 'Sin cuenta';
        if (miniEl) miniEl.textContent = 'Debes abrir tu cuenta';
        if (fullEl) fullEl.textContent = 'Número de cuenta: aún no tienes cuenta bancaria';
        // Sin cuenta todavía: ocultamos la tarjeta y los accesos rápidos
        // (transferir, historial, etc. no tienen sentido sin cuenta) y
        // mostramos el botón para abrirla por primera vez.
        if (card2El) card2El.style.display = 'none';
        if (boxesEl) boxesEl.style.display = 'none';
        if (btnAbrir) btnAbrir.style.display = 'block';
        return;
      }

      if (!res.ok) throw new Error('No se pudo cargar la cuenta');

      const data = await res.json();
      cuentaActual = data.cuenta;

      if (saldoEl) saldoEl.textContent = formatCLP(cuentaActual.saldo);
      if (cuentaEl) cuentaEl.textContent = cuentaActual.numero_cuenta;
      if (miniEl) miniEl.textContent = maskNumeroCuenta(cuentaActual.numero_cuenta);
      if (fullEl) fullEl.textContent = 'Número de cuenta: ' + cuentaActual.numero_cuenta;
      if (btnAbrir) btnAbrir.style.display = 'none';
      if (msgAbrir) msgAbrir.style.display = 'none';
      if (card2El) card2El.style.display = 'block';
      if (boxesEl) boxesEl.style.display = 'grid';

    } catch (err) {
      console.error('Error cargando la cuenta:', err);
      if (saldoEl) saldoEl.textContent = 'Error';
      if (cuentaEl) cuentaEl.textContent = 'Error';
    }
  }

  // ── Abrir cuenta / tarjeta por primera vez ───────────────────────────────
  async function abrirCuenta() {
    const btnAbrir = $('btn-abrir-cuenta');
    const msgAbrir = $('abrir-cuenta-msg');
    if (!btnAbrir) return;

    msgAbrir.style.display = 'block';
    msgAbrir.textContent = '';
    msgAbrir.className = 'transfer-msg';

    btnAbrir.disabled = true;
    const textoOriginal = btnAbrir.textContent;
    btnAbrir.textContent = 'Abriendo cuenta...';

    try {
      const res = await fetch('/api/banco?action=crear', { method: 'POST' });
      const data = await res.json();

      if (!res.ok) {
        // El backend exige tener el DNI creado antes de abrir la cuenta.
        msgAbrir.textContent = data.error || 'No se pudo abrir la cuenta.';
        msgAbrir.classList.add('error');
        return;
      }

      msgAbrir.textContent = '¡Cuenta creada! Cargando...';
      msgAbrir.classList.add('exito');
      await cargarCuenta();
    } catch (err) {
      console.error('Error abriendo la cuenta:', err);
      msgAbrir.textContent = 'Error de conexión. Intenta de nuevo.';
      msgAbrir.classList.add('error');
    } finally {
      btnAbrir.disabled = false;
      btnAbrir.textContent = textoOriginal;
    }
  }

  // ── Transferencias ───────────────────────────────────────────────────────
  window.abrirTransferencia = function () {
    const msgEl = $('transfer-msg');
    if (msgEl) {
      msgEl.textContent = '';
      msgEl.className = 'transfer-msg';
    }
    mostrarSeccion('transferir');
  };

  async function enviarTransferencia(ev) {
    ev.preventDefault();

    const rutInput   = $('transfer-rut');
    const montoInput = $('transfer-monto');
    const msgEl      = $('transfer-msg');
    const btn        = $('transfer-btn');

    const rut   = rutInput.value.trim();
    const monto = parseInt(montoInput.value, 10);

    msgEl.textContent = '';
    msgEl.className = 'transfer-msg';

    if (!rut) {
      msgEl.textContent = 'Ingresa el RUT del destinatario.';
      msgEl.classList.add('error');
      return;
    }
    if (!monto || monto <= 0) {
      msgEl.textContent = 'Ingresa un monto válido.';
      msgEl.classList.add('error');
      return;
    }

    btn.disabled = true;
    const textoOriginal = btn.textContent;
    btn.textContent = 'Enviando...';

    try {
      const res = await fetch('/api/banco?action=transferir', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ rut_destino: rut, monto: monto }),
      });
      const data = await res.json();

      if (!res.ok) {
        msgEl.textContent = data.error || 'No se pudo realizar la transferencia.';
        msgEl.classList.add('error');
        return;
      }

      msgEl.textContent = 'Transferencia exitosa. Nuevo saldo: ' + formatCLP(data.nuevoSaldo);
      msgEl.classList.add('exito');
      rutInput.value = '';
      montoInput.value = '';

      await cargarCuenta();
    } catch (err) {
      console.error('Error en la transferencia:', err);
      msgEl.textContent = 'Error de conexión. Intenta de nuevo.';
      msgEl.classList.add('error');
    } finally {
      btn.disabled = false;
      btn.textContent = textoOriginal;
    }
  }

  // Escapa texto antes de meterlo en innerHTML (nombres, descripciones, etc.
  // pueden venir de otros usuarios, así que nunca se insertan crudos).
  function escHtml(str) {
    const div = document.createElement('div');
    div.textContent = str == null ? '' : String(str);
    return div.innerHTML;
  }

  // ── Historial ─────────────────────────────────────────────────────────────
  window.abrirHistorial = function () {
    mostrarSeccion('historial');
    cargarHistorial();
  };

  async function cargarHistorial() {
    const lista = $('historial-lista');
    if (!lista) return;
    lista.innerHTML = '<p class="hist-vacio">Cargando movimientos...</p>';

    try {
      const res = await fetch('/api/banco?action=historial');

      if (res.status === 401) {
        lista.innerHTML = '<p class="hist-vacio">Inicia sesión para ver tu historial.</p>';
        return;
      }
      if (!res.ok) throw new Error('No se pudo cargar el historial');

      const data = await res.json();
      const transacciones = data.transacciones || [];

      if (transacciones.length === 0) {
        lista.innerHTML = '<p class="hist-vacio">Sin movimientos aún.</p>';
        return;
      }

      lista.innerHTML = transacciones.map(function (t) {
        const signo = t.tipo === 'egreso' ? '-' : '+';
        const fecha = new Date(t.created_at).toLocaleDateString('es-CL', {
          day: '2-digit', month: '2-digit', year: 'numeric',
        });
        return (
          '<div class="hist-item">' +
            '<div class="hist-item-info">' +
              '<span class="hist-item-desc">' + escHtml(t.descripcion || t.tipo) + '</span>' +
              '<span class="hist-item-fecha">' + fecha + '</span>' +
            '</div>' +
            '<div class="hist-item-monto ' + escHtml(t.tipo) + '">' + signo + formatCLP(t.monto) + '</div>' +
          '</div>'
        );
      }).join('');
    } catch (err) {
      console.error('Error cargando el historial:', err);
      lista.innerHTML = '<p class="hist-vacio">Error al cargar el historial.</p>';
    }
  }

  // ── Contactos ─────────────────────────────────────────────────────────────
  window.abrirContactos = function () {
    const msgEl = $('contacto-msg');
    if (msgEl) {
      msgEl.textContent = '';
      msgEl.className = 'transfer-msg';
    }
    mostrarSeccion('contactos');
    cargarContactos();
  };

  async function cargarContactos() {
    const lista = $('contactos-lista');
    if (!lista) return;
    lista.innerHTML = '<p class="hist-vacio">Cargando contactos...</p>';

    try {
      const res = await fetch('/api/banco?action=contactos');

      if (res.status === 401) {
        lista.innerHTML = '<p class="hist-vacio">Inicia sesión para ver tus contactos.</p>';
        return;
      }
      if (!res.ok) throw new Error('No se pudo cargar los contactos');

      const data = await res.json();
      const contactos = data.contactos || [];

      if (contactos.length === 0) {
        lista.innerHTML = '<p class="hist-vacio">Aún no tienes contactos guardados.</p>';
        return;
      }

      lista.innerHTML = contactos.map(function (c) {
        return (
          '<div class="contacto-item">' +
            '<div class="contacto-item-info">' +
              '<span class="contacto-item-nombre">' + escHtml(c.nombre) + '</span>' +
              '<span class="contacto-item-rut">' + escHtml(c.rut) + '</span>' +
            '</div>' +
            '<button type="button" class="contacto-item-borrar" onclick="borrarContacto(' + c.id + ')" title="Eliminar">&times;</button>' +
          '</div>'
        );
      }).join('');
    } catch (err) {
      console.error('Error cargando los contactos:', err);
      lista.innerHTML = '<p class="hist-vacio">Error al cargar los contactos.</p>';
    }
  }

  async function agregarContacto(ev) {
    ev.preventDefault();

    const nombreInput = $('contacto-nombre');
    const rutInput    = $('contacto-rut');
    const msgEl       = $('contacto-msg');
    const btn         = $('contacto-btn');

    const nombre = nombreInput.value.trim();
    const rut    = rutInput.value.trim();

    msgEl.textContent = '';
    msgEl.className = 'transfer-msg';

    if (!nombre) {
      msgEl.textContent = 'Ingresa el nombre del contacto.';
      msgEl.classList.add('error');
      return;
    }
    if (!rut) {
      msgEl.textContent = 'Ingresa el RUT del contacto.';
      msgEl.classList.add('error');
      return;
    }

    btn.disabled = true;
    const textoOriginal = btn.textContent;
    btn.textContent = 'Agregando...';

    try {
      const res = await fetch('/api/banco?action=contacto_agregar', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nombre: nombre, rut: rut }),
      });
      const data = await res.json();

      if (!res.ok) {
        msgEl.textContent = data.error || 'No se pudo agregar el contacto.';
        msgEl.classList.add('error');
        return;
      }

      msgEl.textContent = 'Contacto agregado.';
      msgEl.classList.add('exito');
      nombreInput.value = '';
      rutInput.value = '';

      await cargarContactos();
    } catch (err) {
      console.error('Error agregando contacto:', err);
      msgEl.textContent = 'Error de conexión. Intenta de nuevo.';
      msgEl.classList.add('error');
    } finally {
      btn.disabled = false;
      btn.textContent = textoOriginal;
    }
  }

  window.borrarContacto = async function (id) {
    try {
      const res = await fetch('/api/banco?action=contacto_borrar&id=' + encodeURIComponent(id), {
        method: 'DELETE',
      });
      if (!res.ok) throw new Error('No se pudo eliminar el contacto');
      await cargarContactos();
    } catch (err) {
      console.error('Error eliminando contacto:', err);
    }
  };

  document.addEventListener('DOMContentLoaded', function () {
    cargarCuenta();
    const form = $('transfer-form');
    if (form) form.addEventListener('submit', enviarTransferencia);
    const formContacto = $('contacto-form');
    if (formContacto) formContacto.addEventListener('submit', agregarContacto);
    const btnAbrir = $('btn-abrir-cuenta');
    if (btnAbrir) btnAbrir.addEventListener('click', abrirCuenta);
  });
})();

</script>
