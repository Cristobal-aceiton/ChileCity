<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruleta — Casino ChileCity RP</title>
  <link rel="icon" type="image/png" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/favicon-512.png">
  <link rel="apple-touch-icon" href="/favicon-180.png">
</head>
<body>

    <a href="/casino.html" class="btn-volver-dash">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 12H5"/>
          <path d="M12 19l-7-7 7-7"/>
        </svg>
        Casino
    </a>

    <div class="sueldo">
        <h1>Saldo disponible</h1>
        <p id="saldo">$0</p>
    </div>

    <!-- Contenedor de la ruleta: el <canvas> se dibuja por JS, el puntero es un
         triángulo fijo arriba. #rul-canvas es lo único que necesita existir
         con ese id; puedes envolverlo/decorarlo como quieras. -->
    <div id="rul-rueda-wrap">
        <div id="rul-puntero"></div>
        <canvas id="rul-canvas" width="320" height="320"></canvas>
        <div id="rul-resultado-chip"></div>
    </div>

    <!-- Mensajes de error / feedback -->
    <div id="rul-mensaje"></div>

    <!-- Tabs de tipo de apuesta -->
    <div id="rul-tabs">
        <button type="button" class="rul-tab activo" data-tipo="color">Color</button>
        <button type="button" class="rul-tab" data-tipo="paridad">Par / Impar</button>
        <button type="button" class="rul-tab" data-tipo="mitad">Mitad</button>
        <button type="button" class="rul-tab" data-tipo="docena">Docena</button>
        <button type="button" class="rul-tab" data-tipo="numero">Número</button>
    </div>

    <!-- Opciones de la apuesta seleccionada: se rellena por JS según el tab -->
    <div id="rul-opciones"></div>

    <!-- Monto + botón de girar -->
    <div id="rul-controles">
        <label for="rul-monto">Monto a apostar</label>
        <input type="number" id="rul-monto" min="1000" step="1000" value="1000">
        <button type="button" id="rul-girar">🎡 Girar</button>
    </div>

    <!-- Historial de tiradas recientes -->
    <div id="rul-historial">
        <h2>Historial</h2>
        <ul id="rul-historial-lista"></ul>
    </div>

    <script src="/js/ruleta.js?v=1" defer></script>

</body>
</html>

<style>

body, html {
    background-color: #495d70;
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    color: #fff;
    padding-bottom: 60px;
}

.btn-volver-dash {
  display: flex;
  align-items: center;
  gap: 6px;
  width: fit-content;
  max-width: 350px;
  margin: 20px auto 0;
  padding: 8px 14px;
  color: #ffffff;
  font-family: Arial, Helvetica, sans-serif;
  font-size: 14px;
  font-weight: 600;
  text-decoration: none;
  background-color: rgb(37, 37, 37);
  border-radius: 30px;
  box-sizing: border-box;
}

.sueldo {
    background-color: #00ff00ad;
    max-width: 320px;
    margin: 20px auto 0;
    padding: 1px;
    border-radius: 10px;
}

.sueldo h1 {
    text-align: center;
    color: white;
    font-weight: 600;
    font-size: 20px;
}

.sueldo p {
    text-align: center;
    color: rgb(255, 255, 255);
    font-weight: 100;
    font-size: 20px;
}

#rul-rueda-wrap {
    position: relative;
    width: 320px;
    margin: 40px auto 10px;
    display: flex;
    justify-content: center;
}

#rul-puntero {
    position: absolute;
    top: -6px;
    left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 14px solid transparent;
    border-right: 14px solid transparent;
    border-top: 22px solid #22c55e;
    z-index: 3;
}

#rul-canvas {
    border-radius: 50%;
    transition: transform 4.5s cubic-bezier(.15,.85,.25,1);
    box-shadow: 0 0 0 6px #1f2937, 0 0 30px rgba(0,0,0,.4);
}

#rul-resultado-chip {
    position: absolute;
    bottom: -18px;
    left: 50%;
    transform: translateX(-50%);
    background: #111827;
    padding: 6px 16px;
    border-radius: 20px;
    font-weight: bold;
    font-size: 15px;
    min-width: 40px;
    text-align: center;
    display: none;
}

#rul-mensaje {
    max-width: 340px;
    margin: 30px auto 0;
    text-align: center;
    font-size: 14px;
    min-height: 18px;
    color: #fca5a5;
}

#rul-tabs {
    max-width: 400px;
    margin: 16px auto 0;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
}

.rul-tab {
    background: #1f2937;
    color: #cbd5e1;
    border: none;
    padding: 8px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
}

.rul-tab.activo {
    background: #22c55e;
    color: #06210f;
}

#rul-opciones {
    max-width: 400px;
    margin: 16px auto 0;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    padding: 0 12px;
}

.rul-opcion {
    background: #334155;
    color: #fff;
    border: 2px solid transparent;
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    min-width: 34px;
}

.rul-opcion.rojo { background: #b91c1c; }
.rul-opcion.negro { background: #111827; }
.rul-opcion.verde { background: #15803d; }

.rul-opcion.seleccionada {
    border-color: #22c55e;
    box-shadow: 0 0 0 2px rgba(34,197,94,.4);
}

#rul-controles {
    max-width: 300px;
    margin: 24px auto 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
    align-items: center;
}

#rul-controles label {
    font-size: 13px;
    color: #cbd5e1;
}

#rul-monto {
    width: 100%;
    box-sizing: border-box;
    padding: 10px;
    border-radius: 8px;
    border: none;
    font-size: 15px;
    text-align: center;
}

#rul-girar {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 30px;
    background: #22c55e;
    color: #06210f;
    font-weight: 700;
    font-size: 16px;
    cursor: pointer;
}

#rul-girar:disabled {
    opacity: .5;
    cursor: not-allowed;
}

#rul-historial {
    max-width: 400px;
    margin: 36px auto 0;
    padding: 0 12px;
}

#rul-historial h2 {
    font-size: 15px;
    color: #cbd5e1;
}

#rul-historial-lista {
    list-style: none;
    padding: 0;
    margin: 0;
    display: flex;
    flex-direction: column;
    gap: 6px;
    font-size: 13px;
}

#rul-historial-lista li {
    background: rgba(255,255,255,.06);
    padding: 8px 10px;
    border-radius: 8px;
    display: flex;
    justify-content: space-between;
    gap: 10px;
}

</style>
