<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruleta — Casino ChileCity RP</title>
  <link rel="icon" type="image/png" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/favicon-512.png">
  <link rel="apple-touch-icon" href="/favicon-180.png">
</head>
<body>

    <div id="bg-fx" aria-hidden="true"></div>
    <div class="rul-overlay" aria-hidden="true"></div>

    <div class="cs-banner-construccion">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 9v4M12 17h.01M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0Z"/></svg>
        Casino en construcción — puede que encuentres algún error mientras seguimos mejorándolo.
    </div>

    <a href="/casino.html" class="btn-volver-dash">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 12H5"/>
          <path d="M12 19l-7-7 7-7"/>
        </svg>
        Casino
    </a>

    <div class="gm-header">
        <h1>Ruleta</h1>
        <p>Apuesta a color, número o docena</p>
    </div>

    <div class="sueldo">
        <h1>Saldo disponible</h1>
        <p id="saldo">$0</p>
    </div>

    <!-- Contenedor de la ruleta: el <canvas> se dibuja por JS, el puntero es un
         triángulo fijo arriba. #rul-canvas es lo único que necesita existir
         con ese id; puedes envolverlo/decorarlo como quieras. -->
    <div id="rul-rueda-wrap">
        <div id="rul-puntero"></div>
        <canvas id="rul-canvas" width="320" height="320"></canvas>
        <div id="rul-resultado-chip"></div>
    </div>

    <!-- Mensajes de error / feedback -->
    <div id="rul-mensaje"></div>

    <!-- Solo se puede apostar a un color: rojo, negro o verde -->
    <div id="rul-opciones-titulo">Elige un color</div>
    <div id="rul-opciones"></div>

    <!-- Monto + botón de girar -->
    <div id="rul-controles">
        <label for="rul-monto">Monto a apostar</label>
        <input type="number" id="rul-monto" min="1000" step="1000" value="1000">
        <button type="button" id="rul-girar">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <circle cx="12" cy="12" r="3"/>
                <path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
            </svg>
            Girar
        </button>
    </div>

    <!-- Historial de tiradas recientes -->
    <div id="rul-historial">
        <h2>Historial</h2>
        <ul id="rul-historial-lista"></ul>
    </div>

    <script src="/js/casino-sfx.js?v=1"></script>
    <script src="/js/ruleta.js?v=2" defer></script>

</body>
</html>

<style>

*, *::before, *::after { box-sizing: border-box; }

body, html {
    background-color: #0d0303;
    margin: 0;
    font-family: Inter, Arial, Helvetica, sans-serif;
    color: #fff;
    padding-bottom: 60px;
    min-height: 100%;
}

/* ── Fondo rojo del sitio (mismo look que el resto de ChileCity RP) ─────── */
#bg-fx {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
    background: #0d0303;
    pointer-events: none;
}

#bg-fx::before, #bg-fx::after {
    content: '';
    position: absolute;
    border-radius: 50%;
    filter: blur(55px);
    will-change: transform;
}

#bg-fx::before {
    width: 120vmax;
    height: 120vmax;
    top: -55vmax;
    left: -45vmax;
    background: radial-gradient(circle at 30% 30%, rgba(230,25,25,.55), rgba(230,25,25,0) 62%);
    animation: rulBgFloatA 14s ease-in-out infinite alternate;
}

#bg-fx::after {
    width: 110vmax;
    height: 110vmax;
    bottom: -50vmax;
    right: -40vmax;
    background: radial-gradient(circle at 70% 70%, rgba(160,10,10,.5), rgba(0,0,0,0) 62%);
    animation: rulBgFloatB 16s ease-in-out infinite alternate;
}

@keyframes rulBgFloatA {
    0% { transform: translate(0,0) scale(1); }
    50% { transform: translate(6vw,4vh) scale(1.08); }
    100% { transform: translate(-4vw,6vh) scale(1); }
}

@keyframes rulBgFloatB {
    0% { transform: translate(0,0) scale(1); }
    50% { transform: translate(-5vw,-6vh) scale(1.05); }
    100% { transform: translate(5vw,-3vh) scale(1); }
}

.rul-overlay {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background:
        radial-gradient(ellipse 55% 45% at 78% 12%, rgba(220,30,30,.1), transparent 60%),
        radial-gradient(ellipse at center, transparent 35%, rgba(0,0,0,.65) 100%);
}

@media (prefers-reduced-motion: reduce) {
    #bg-fx::before, #bg-fx::after { animation: none !important; }
}

/* Todo el contenido va sobre el fondo */
body > *:not(#bg-fx):not(.rul-overlay) {
    position: relative;
    z-index: 2;
}

.btn-volver-dash {
  display: flex;
  align-items: center;
  gap: 6px;
  width: fit-content;
  max-width: 350px;
  margin: 20px auto 0;
  padding: 8px 14px;
  color: rgba(255,255,255,.8);
  font-family: Inter, Arial, Helvetica, sans-serif;
  font-size: 14px;
  font-weight: 600;
  text-decoration: none;
  background-color: rgba(255,255,255,.06);
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 30px;
  box-sizing: border-box;
  transition: all .25s cubic-bezier(.16,1,.3,1);
}

.btn-volver-dash:hover {
    background-color: rgba(255,255,255,.12);
    color: #fff;
}

.gm-header {
    text-align: center;
    margin: 20px auto 0;
    max-width: 340px;
}

.gm-header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 1px;
    background: linear-gradient(135deg, #fff 50%, #ff4444);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin: 0;
}

.gm-header p {
    color: rgba(255,255,255,.45);
    font-size: 12.5px;
    margin: 2px 0 0;
}

.sueldo {
    background: rgba(16,185,129,.1);
    border: 1px solid rgba(16,185,129,.3);
    max-width: 320px;
    margin: 20px auto 0;
    padding: 12px 10px;
    border-radius: 14px;
}

.sueldo h1 {
    text-align: center;
    color: rgba(255,255,255,.5);
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin: 0 0 4px;
}

.sueldo p {
    text-align: center;
    color: #34d399;
    font-weight: 800;
    font-size: 22px;
    margin: 0;
    transition: transform .2s ease;
}

.sueldo p.rul-saldo-anim {
    animation: rulSaldoPop .4s ease;
}

@keyframes rulSaldoPop {
    0% { transform: scale(1); }
    40% { transform: scale(1.12); }
    100% { transform: scale(1); }
}

#rul-rueda-wrap {
    position: relative;
    width: 320px;
    margin: 40px auto 10px;
    display: flex;
    justify-content: center;
}

#rul-puntero {
    position: absolute;
    top: -6px;
    left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 14px solid transparent;
    border-right: 14px solid transparent;
    border-top: 22px solid #e02020;
    z-index: 3;
    filter: drop-shadow(0 0 6px rgba(224,32,32,.7));
}

#rul-canvas {
    border-radius: 50%;
    transition: transform 4.5s cubic-bezier(.15,.85,.25,1);
    box-shadow: 0 0 0 6px #1f2937, 0 0 30px rgba(224,32,32,.35);
}

#rul-canvas.rul-girando {
    box-shadow: 0 0 0 6px #1f2937, 0 0 46px rgba(224,32,32,.6);
}

#rul-resultado-chip {
    position: absolute;
    bottom: -18px;
    left: 50%;
    transform: translateX(-50%);
    background: #111827;
    padding: 6px 16px;
    border-radius: 20px;
    font-weight: bold;
    font-size: 15px;
    min-width: 40px;
    text-align: center;
    display: none;
}

#rul-resultado-chip.rul-chip-anim {
    animation: rulChipPop .45s cubic-bezier(.16,1,.3,1);
}

@keyframes rulChipPop {
    0% { transform: translateX(-50%) scale(.6); opacity: 0; }
    60% { transform: translateX(-50%) scale(1.1); opacity: 1; }
    100% { transform: translateX(-50%) scale(1); opacity: 1; }
}

#rul-mensaje {
    max-width: 340px;
    margin: 30px auto 0;
    text-align: center;
    font-size: 14px;
    min-height: 18px;
    color: #fca5a5;
}

#rul-mensaje.rul-gano { color: #4ade80; }

#rul-opciones-titulo {
    max-width: 400px;
    margin: 22px auto 0;
    text-align: center;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(255,255,255,.4);
}

#rul-opciones {
    max-width: 400px;
    margin: 10px auto 0;
    display: flex;
    justify-content: center;
    gap: 10px;
    padding: 0 12px;
}

.rul-opcion {
    flex: 1;
    max-width: 120px;
    background: linear-gradient(160deg, #475569, #334155);
    color: #fff;
    border: 2px solid transparent;
    padding: 14px 10px;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    box-shadow: 0 8px 20px rgba(0,0,0,.3);
    transition: transform .15s ease, box-shadow .2s ease;
}

.rul-opcion:hover {
    transform: translateY(-2px);
}

.rul-opcion:active {
    transform: scale(.95);
}

.rul-opcion svg {
    display: block;
}

.rul-opcion.rojo { background: linear-gradient(160deg, #ef4444, #b91c1c); }
.rul-opcion.negro { background: linear-gradient(160deg, #1f2937, #0a0e14); }
.rul-opcion.verde { background: linear-gradient(160deg, #22c55e, #15803d); }

.rul-opcion.seleccionada {
    border-color: #fff;
    box-shadow: 0 0 0 3px rgba(255,255,255,.18), 0 0 20px rgba(224,32,32,.4);
    transform: translateY(-2px);
}

.rul-opcion-mult {
    font-size: 10px;
    font-weight: 700;
    opacity: .75;
}

#rul-controles {
    max-width: 300px;
    margin: 24px auto 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
    align-items: center;
}

#rul-controles label {
    font-size: 13px;
    color: #cbd5e1;
}

#rul-monto {
    width: 100%;
    box-sizing: border-box;
    padding: 10px;
    border-radius: 8px;
    border: none;
    font-size: 15px;
    text-align: center;
}

#rul-girar {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 30px;
    background: #e02020;
    color: #fff;
    font-weight: 700;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    box-shadow: 0 0 24px rgba(224,32,32,.35);
    transition: transform .2s ease, box-shadow .2s ease;
}

#rul-girar:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 0 32px rgba(224,32,32,.55);
}

#rul-girar:active:not(:disabled) {
    transform: scale(.97);
}

#rul-girar svg.rul-spin {
    animation: rulSpinIcon 1s linear infinite;
}

@keyframes rulSpinIcon {
    to { transform: rotate(360deg); }
}

#rul-girar:disabled {
    opacity: .5;
    cursor: not-allowed;
}

#rul-historial {
    max-width: 400px;
    margin: 36px auto 0;
    padding: 0 12px;
}

#rul-historial h2 {
    font-size: 15px;
    color: #cbd5e1;
}

#rul-historial-lista {
    list-style: none;
    padding: 0;
    margin: 0;
    display: flex;
    flex-direction: column;
    gap: 6px;
    font-size: 13px;
}

#rul-historial-lista li {
    background: rgba(255,255,255,.06);
    padding: 8px 10px;
    border-radius: 8px;
    display: flex;
    justify-content: space-between;
    gap: 10px;
    animation: rulHistIn .3s ease;
}

@keyframes rulHistIn {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
}


.cs-banner-construccion {
  display: flex;
  align-items: center;
  gap: 8px;
  justify-content: center;
  padding: 10px 16px;
  background: rgba(245, 158, 11, .1);
  border-bottom: 1px solid rgba(245, 158, 11, .3);
  color: #fbbf24;
  font-size: 12.5px;
  font-weight: 600;
  text-align: center;
}

.cs-banner-construccion svg {
  flex-shrink: 0;
}

</style>
