<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casino - ChileCity RP</title>
    <link rel="icon" type="image/webp" href="/logo.webp">
    <link rel="apple-touch-icon" href="/logo.webp">
</head>
<body>
    
<a href="/dashboard.html" class="btn-volver-dash">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M19 12H5"/>
      <path d="M12 19l-7-7 7-7"/>
    </svg>
    Volver
  </a>

  <div class="casino-container">
    <h1>Saldo disponible</h1>
    <p id="saldo">Cargando...</p>
  </div>

  <div class="portadas-casino">

    <a href="ruleta.html">
        <img src="1.png" alt="Casino 1">
    </a>

    <a href="">
        <img src="2.png" alt="Casino 2">
    </a>

    <a href="">
        <img src="3.png" alt="Casino 3">
    </a>

  </div>

  <script>
    (function () {
      function formatCLP(n) {
        return '$' + Math.round(Number(n) || 0).toLocaleString('es-CL');
      }
      async function cargarSaldo() {
        const el = document.getElementById('saldo');
        try {
          const r = await fetch('/api/banco?action=cuenta', { credentials: 'same-origin' });
          if (r.status === 401) { window.location.href = '/'; return; }
          if (!r.ok) throw new Error();
          const data = await r.json();
          el.textContent = formatCLP(data.saldo);
        } catch {
          el.textContent = '—';
        }
      }
      document.addEventListener('DOMContentLoaded', cargarSaldo);
    })();
  </script>

</body>
</html>

<style>
    body, html {
        background-color: rgb(255, 136, 0);
    }


    .btn-volver-dash {
  display: flex;
  align-items: center;
  gap: 6px;
  width: fit-content;
  max-width: 350px;
  margin: 20px auto 0;
  padding: 8px 14px;
  color: #ffffff;
  font-family: Arial, Helvetica, sans-serif;
  font-size: 14px;
  font-weight: 600;
  text-decoration: none;
  background-color: rgb(65, 60, 60);
  border-radius: 30px;
  box-sizing: border-box;
}

.casino-container {
  max-width: 300px;
  margin: 0 auto;
  text-align: center;
  background-color: rgba(255, 255, 255, 0.575);
  font-family: Arial, Helvetica, sans-serif;
  padding: 10px;
  margin-top: 20px;
  border-radius: 10px;
}

.casino-container h1 {
  font-size: 24px;
  margin-bottom: 10px;
}

.portadas-casino {
    display: grid;
    grid-template-columns: repeat(2, 200px);
    gap: 20px;
    justify-content: center;
    margin-top: 30px;
}

.portadas-casino a {
    display: block;
}

.portadas-casino img {
    width: 200px;
    display: block;
    border-radius: 10px;
}

.portadas-casino a:nth-child(3) {
    grid-column: 1 / 3;
    justify-self: center;
}

</style>
