<style>

*, *::before, *::after { box-sizing: border-box; }

body, html {
    background-color: #0d0303;
    margin: 0;
    font-family: Inter, Arial, Helvetica, sans-serif;
    color: #fff;
    padding-bottom: 60px;
    min-height: 100%;
}

/* ── Fondo rojo del sitio (mismo look que el resto de ChileCity RP) ─────── */
#bg-fx {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
    background: #0d0303;
    pointer-events: none;
}

#bg-fx::before, #bg-fx::after {
    content: '';
    position: absolute;
    border-radius: 50%;
    filter: blur(55px);
    will-change: transform;
}

#bg-fx::before {
    width: 120vmax;
    height: 120vmax;
    top: -55vmax;
    left: -45vmax;
    background: radial-gradient(circle at 30% 30%, rgba(230,25,25,.55), rgba(230,25,25,0) 62%);
    animation: mnBgFloatA 14s ease-in-out infinite alternate;
}

#bg-fx::after {
    width: 110vmax;
    height: 110vmax;
    bottom: -50vmax;
    right: -40vmax;
    background: radial-gradient(circle at 70% 70%, rgba(160,10,10,.5), rgba(0,0,0,0) 62%);
    animation: mnBgFloatB 16s ease-in-out infinite alternate;
}

@keyframes mnBgFloatA {
    0% { transform: translate(0,0) scale(1); }
    50% { transform: translate(6vw,4vh) scale(1.08); }
    100% { transform: translate(-4vw,6vh) scale(1); }
}

@keyframes mnBgFloatB {
    0% { transform: translate(0,0) scale(1); }
    50% { transform: translate(-5vw,-6vh) scale(1.05); }
    100% { transform: translate(5vw,-3vh) scale(1); }
}

.mn-overlay {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background:
        radial-gradient(ellipse 55% 45% at 78% 12%, rgba(220,30,30,.1), transparent 60%),
        radial-gradient(ellipse at center, transparent 35%, rgba(0,0,0,.65) 100%);
}

@media (prefers-reduced-motion: reduce) {
    #bg-fx::before, #bg-fx::after { animation: none !important; }
}

body > *:not(#bg-fx):not(.mn-overlay) {
    position: relative;
    z-index: 2;
}

.gm-header {
    text-align: center;
    margin: 24px auto 0;
    max-width: 340px;
}

.gm-header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 1px;
    background: linear-gradient(135deg, #fff 50%, #ff4444);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin: 0;
}

.gm-header p {
    color: rgba(255,255,255,.45);
    font-size: 12.5px;
    margin: 2px 0 0;
}

.btn-volver-dash {
  display: flex;
  align-items: center;
  gap: 6px;
  width: fit-content;
  max-width: 350px;
  margin: 20px auto 0;
  padding: 8px 14px;
  color: rgba(255,255,255,.8);
  font-size: 14px;
  font-weight: 600;
  text-decoration: none;
  background-color: rgba(255,255,255,.06);
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 30px;
  box-sizing: border-box;
  transition: all .25s cubic-bezier(.16,1,.3,1);
}

.btn-volver-dash:hover {
    background-color: rgba(255,255,255,.12);
    color: #fff;
}

.sueldo {
    background: rgba(16,185,129,.1);
    border: 1px solid rgba(16,185,129,.3);
    max-width: 320px;
    margin: 20px auto 0;
    padding: 12px 10px;
    border-radius: 14px;
}

.sueldo h1 {
    text-align: center;
    color: rgba(255,255,255,.5);
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin: 0 0 4px;
}

.sueldo p {
    text-align: center;
    color: #34d399;
    font-weight: 800;
    font-size: 22px;
    margin: 0;
}

.mn-scene {
    width: 180px;
    height: 180px;
    margin: 40px auto 10px;
    perspective: 700px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.mn-moneda {
    width: 160px;
    height: 160px;
    position: relative;
    transform-style: preserve-3d;
    transition: transform .1s;
    border-radius: 50%;
}

.mn-moneda.girando {
    animation: mnFlip 1.6s cubic-bezier(.45,.05,.55,.95) forwards;
}

@keyframes mnFlip {
    0%   { transform: rotateY(0) rotateX(0); }
    20%  { transform: rotateY(360deg) rotateX(8deg); }
    50%  { transform: rotateY(1080deg) rotateX(-6deg); }
    80%  { transform: rotateY(1800deg) rotateX(4deg); }
    100% { transform: rotateY(2160deg) rotateX(0); }
}

.mn-cara, .mn-cruz {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 2px;
    color: #fff;
}

.mn-cara {
    background: radial-gradient(circle at 35% 35%, #ff6b6b 0%, #e02020 45%, #8f1414 100%);
    box-shadow: 0 0 30px rgba(224,32,32,.6), inset 0 2px 8px rgba(255,255,255,.25), inset 0 -2px 6px rgba(0,0,0,.3);
    border: 3px solid rgba(255,120,120,.5);
}

.mn-cruz {
    background: radial-gradient(circle at 35% 35%, #444 0%, #1a1a1a 45%, #000 100%);
    box-shadow: 0 0 30px rgba(0,0,0,.6), inset 0 2px 8px rgba(255,255,255,.1), inset 0 -2px 6px rgba(0,0,0,.4);
    border: 3px solid rgba(255,255,255,.15);
    transform: rotateY(180deg);
}

#mn-mensaje {
    max-width: 340px;
    margin: 26px auto 0;
    text-align: center;
    font-size: 14px;
    min-height: 18px;
    color: #fca5a5;
}

#mn-opciones {
    max-width: 320px;
    margin: 16px auto 0;
    display: flex;
    gap: 10px;
    padding: 0 12px;
}

.mn-opcion {
    flex: 1;
    background: linear-gradient(160deg, rgba(255,255,255,.07), rgba(255,255,255,.02));
    color: #fff;
    border: 2px solid rgba(255,255,255,.1);
    padding: 14px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 6px 18px rgba(0,0,0,.25);
    transition: all .2s cubic-bezier(.16,1,.3,1);
}

.mn-opcion:hover {
    transform: translateY(-2px);
    background: linear-gradient(160deg, rgba(255,255,255,.1), rgba(255,255,255,.03));
}

.mn-opcion.seleccionada {
    border-color: #e02020;
    background: linear-gradient(160deg, rgba(224,32,32,.22), rgba(224,32,32,.08));
    box-shadow: 0 0 0 2px rgba(224,32,32,.3), 0 6px 20px rgba(224,32,32,.25);
}

#mn-controles {
    max-width: 300px;
    margin: 24px auto 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
    align-items: center;
    padding: 0 12px;
}

#mn-controles label {
    font-size: 13px;
    color: rgba(255,255,255,.5);
    align-self: flex-start;
}

#mn-monto {
    width: 100%;
    box-sizing: border-box;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,.1);
    background: rgba(255,255,255,.06);
    color: #fff;
    font-size: 15px;
    text-align: center;
}

#mn-lanzar {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 30px;
    background: #e02020;
    color: #fff;
    font-weight: 700;
    font-size: 16px;
    cursor: pointer;
}

#mn-lanzar:disabled {
    opacity: .5;
    cursor: not-allowed;
}

#mn-historial {
    max-width: 400px;
    margin: 36px auto 0;
    padding: 0 12px;
}

#mn-historial h2 {
    font-size: 15px;
    color: rgba(255,255,255,.6);
}

#mn-historial-lista {
    list-style: none;
    padding: 0;
    margin: 0;
    display: flex;
    flex-direction: column;
    gap: 6px;

#mn-historial-lista li {

    padding: 8px 10px;

    display: flex;
    justify-content: space-between;
    gap: 10px;
}


.cs-banner-construccion {
  display: flex;
  align-items: center;
  gap: 8px;
  justify-content: center;
  padding: 10px 16px;

  color: #fbbf24;
  font-size: 12.5px;
  font-weight: 600;
  text-align: center;

.cs-banner-construccion svg {
  flex-shrink: 0;
}

</style>
